<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Counter.css">
    <title>Simple Digital Counter</title>
</head>

<body>
    <header>
        <nav>
            <h1>Simple Digital Counter</h1>
        </nav>
    </header>
    <main>
        <div class="counter">
            <div class="count-result">
                <h1 id="HeadCount">0</h1>
            </div>
            <div class="buttons">
                <button id="Inc" class="counter-btn">+1</button>
                <button id="Dec" class="counter-btn">-1</button>
            </div>
        </div>
    </main>
    <footer>&copy Simple Digital Counter - All rights reserved</footer>
    <script src="Counter.js"></script>
</body>

</html>
